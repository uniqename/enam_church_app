name: faith_klinik_app
description: "Faith Klinik Ministries - Building faith, healing lives, transforming communities in Columbus, Ohio"
publish_to: 'none'

version: 4.1.1+26

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.1

  # Supabase backend
  supabase_flutter: ^2.3.4

  # Environment variables
  flutter_dotenv: ^5.1.0

  # Storage & preferences
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0

  # Auth
  local_auth: ^2.1.8

  # Networking & images
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.4

  # Media
  image_picker: ^1.0.7
  file_picker: ^6.1.1
  video_player: ^2.8.3
  audioplayers: ^6.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3

  # HTML rendering (birthday card)
  flutter_html: ^3.0.0-beta.2
  webview_flutter: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/html/
